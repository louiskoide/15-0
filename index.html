<style>/* ============================================================================
   15-0 — game styles. Built on the Transfer Desk design tokens.
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=Oswald:wght@500;600;700&display=swap');

:root{
  --bg:#eceef1; --surface:#ffffff; --ink:#0b0e14; --ink-soft:#5a626e; --ink-faint:#9aa1ac;
  --line:#e3e6ea; --line-strong:#d4d8de;
  --interest:#2563eb; --talks:#e08600; --done:#16a34a; --breaking:#ee2b2d; --blocked:#b0454b;
  --font-display:'Oswald','Arial Narrow',sans-serif; --font-ui:'Archivo',system-ui,sans-serif; --font-mono:'IBM Plex Mono',ui-monospace,monospace;
  --tracking-kicker:0.22em; --tracking-label:0.1em;
  --shadow-flush:0 1px 0 rgba(11,14,20,.02); --shadow-hover:0 14px 30px -20px rgba(11,14,20,.4);
  --pitch:#0c2a20; --pitch-2:#0e3026; --pitch-line:rgba(255,255,255,.30);
  /* Champions-League-style accents (original gradients — colour only, no marks) */
  --ucl:radial-gradient(105% 120% at 78% 4%, rgba(123,42,185,.60) 0%, rgba(44,62,165,.30) 38%, transparent 66%), radial-gradient(95% 120% at 102% 102%, rgba(196,40,158,.48) 0%, transparent 55%), linear-gradient(150deg,#0a1444 0%,#111c5e 52%,#181f68 100%);
  --ucl-border:linear-gradient(135deg,#2f8bff 0%,#6a2bd0 55%,#c0289e 100%);
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{background:var(--bg); color:var(--ink); font-family:var(--font-ui); letter-spacing:-.01em; -webkit-font-smoothing:antialiased;}
button{font-family:inherit; cursor:pointer;}
.fd-flag{display:inline-block; width:18px; height:13px; border-radius:2px; overflow:hidden; box-shadow:0 0 0 1px rgba(0,0,0,.14); flex-shrink:0; line-height:0;}
.fd-flag.big{width:26px; height:18px;}
.fd-flag svg{display:block; width:100%; height:100%;}

.fd-wrap{max-width:1240px; margin:0 auto; padding:0 20px 56px;}

/* mono helpers */
.kick{font-family:var(--font-mono); font-size:11px; letter-spacing:var(--tracking-kicker); text-transform:uppercase; color:var(--ink-soft);}
.label{font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:var(--tracking-label); text-transform:uppercase;}
.meta{font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint); letter-spacing:.04em;}

/* ---- masthead ---- */
.fd-top{display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap; padding:24px 0 16px;}
.fd-brand{display:flex; flex-direction:column; gap:5px;}
.fd-logo{font-family:var(--font-display); font-size:clamp(40px,7vw,76px); line-height:.84; text-transform:uppercase; letter-spacing:.01em; white-space:nowrap; display:inline-block;}
.fd-logo .dot{color:var(--breaking);}
.fd-tagline{font-size:13.5px; color:var(--ink-soft); max-width:520px; line-height:1.45;}
.fd-headbadges{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.fd-badge{display:inline-flex; align-items:center; gap:7px; font-family:var(--font-mono); font-size:10.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:6px 11px; border-radius:999px; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-soft);}
.fd-badge .led{width:7px; height:7px; border-radius:50%; background:var(--done); animation:pulse 1.6s infinite;}
.fd-badge b{color:var(--ink);}


/* ===========================================================================
   SETUP SCREEN
   ========================================================================= */
.fd-setup{display:grid; grid-template-columns:1.05fr .95fr; gap:22px; align-items:start;}
@media(max-width:560px){.fd-setup{grid-template-columns:1fr;}}
.fd-panel{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px;}
.fd-panel-h{font-family:var(--font-display); font-size:22px; text-transform:uppercase; letter-spacing:.01em; margin:0 0 2px;}
.fd-panel-sub{font-size:12.5px; color:var(--ink-soft); margin:0 0 18px; line-height:1.5;}

.fd-opt{margin-bottom:20px;}
.fd-opt-label{display:flex; align-items:baseline; gap:8px; margin-bottom:9px;}
.fd-opt-label .label{color:var(--ink);}
.fd-opt-label .hint{font-size:11.5px; color:var(--ink-faint);}
.fd-seg{display:inline-flex; background:var(--bg); border:1px solid var(--line); border-radius:11px; padding:4px; gap:3px; width:100%;}
.fd-seg.two button{flex:1;}
.fd-seg button{flex:1; border:none; background:transparent; color:var(--ink-soft); font-family:var(--font-ui); font-weight:700; font-size:13px; padding:11px 10px; border-radius:8px; transition:.15s; display:flex; flex-direction:column; align-items:center; gap:2px; letter-spacing:.01em;}
.fd-seg button .sm{font-family:var(--font-mono); font-weight:500; font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint);}
.fd-seg button.on{background:var(--ink); color:#fff;}
.fd-seg button.on .sm{color:rgba(255,255,255,.6);}
.fd-seg button:not(.on):hover{color:var(--ink);}

.fd-setup-side{display:flex; flex-direction:column; gap:22px;}
.fd-formgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
.fd-formbtn{border:1px solid var(--line-strong); background:var(--surface); border-radius:10px; padding:13px 6px; font-family:var(--font-mono); font-weight:600; font-size:14px; letter-spacing:.04em; color:var(--ink-soft); transition:.15s;}
.fd-formbtn.on{background:var(--ink); color:#fff; border-color:var(--ink);}
.fd-formbtn:not(.on):hover{border-color:var(--ink-soft); color:var(--ink);}
.fd-pitchwrap.preview .fd-pitch{max-width:300px;}
.fd-formhint{margin-top:13px; font-size:11.5px; line-height:1.5; color:var(--ink-faint); text-align:center;}

.fd-kick{width:100%; margin-top:6px; background:var(--ink); color:#fff; border:none; border-radius:12px; padding:17px; font-family:var(--font-display); font-size:24px; letter-spacing:.03em; text-transform:uppercase; transition:.16s; display:flex; align-items:center; justify-content:center; gap:10px; white-space:nowrap;}
.fd-kick:hover{transform:translateY(-2px); box-shadow:0 16px 34px -20px rgba(11,14,20,.6);}
.fd-kick .dot{color:var(--breaking); font-size:30px; line-height:0; display:inline-block;}

.fd-howto{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px;}
.fd-howto.wide{margin-top:22px;}
.fd-howhead{margin-bottom:14px;}
.fd-howsteps{margin:0; padding:0; list-style:none; counter-reset:s; display:flex; gap:14px;}
.fd-howsteps li{counter-increment:s; flex:1 1 0; min-width:0; display:flex; flex-direction:column; gap:9px; font-size:12.5px; line-height:1.5; color:var(--ink-soft); padding:14px 15px; background:var(--bg); border:1px solid var(--line); border-radius:12px;}
.fd-howsteps li::before{content:counter(s); flex-shrink:0; width:26px; height:26px; border-radius:7px; background:var(--ink); color:#fff; font-family:var(--font-mono); font-weight:600; font-size:12px; display:flex; align-items:center; justify-content:center;}
.fd-howsteps li b{color:var(--ink); font-weight:700;}
@media(max-width:760px){.fd-howsteps{flex-direction:column;} .fd-howsteps li{flex-direction:row; gap:13px;}}
.fd-meth{margin-top:16px; padding-top:14px; border-top:1px dashed var(--line); font-size:11.5px; line-height:1.55; color:var(--ink-faint); display:flex; flex-wrap:wrap; align-items:center; gap:8px 18px;}
.fd-meth-txt{flex:1 1 340px; min-width:0;}
.fd-meth b{color:var(--ink-soft);}
.fd-tiers{display:flex; flex-wrap:wrap; gap:6px; margin:0; flex-shrink:0;}
.fd-tier{font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:.04em; padding:3px 8px; border-radius:5px; color:#fff; white-space:nowrap;}

/* ===========================================================================
   DRAFT SCREEN
   ========================================================================= */
.fd-draft{display:grid; grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr); gap:20px; align-items:start;}
@media(max-width:560px){.fd-draft{grid-template-columns:1fr;}}

.fd-subbar{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:16px;}
.fd-modebadges{display:flex; gap:7px; flex-wrap:wrap;}
.fd-mb{font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:5px 10px; border-radius:6px; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-soft);}
.fd-mb.k{background:var(--ink); color:#fff; border-color:var(--ink);}
.fd-restart{font-family:var(--font-mono); font-size:10.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:8px 13px; border-radius:999px; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-soft); transition:.15s; display:inline-flex; align-items:center; gap:7px;}
.fd-restart:hover{border-color:var(--ink-soft); color:var(--ink);}

/* spin panel */
.fd-spin{background:var(--surface); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:var(--shadow-flush);}
.fd-spin-bar{height:6px; background:var(--cc,#5a626e); transition:background .3s;}
.fd-spin-in{padding:18px;}
.fd-target{display:flex; align-items:center; gap:9px; margin-bottom:14px; flex-wrap:wrap;}
.fd-target .label{color:var(--ink-faint);}
.fd-target .slot{font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#fff; background:var(--ink); padding:5px 10px; border-radius:6px;}
.fd-target .prog{margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--ink-soft);}
.fd-target .prog b{color:var(--ink);}

.fd-clubrow{display:flex; align-items:center; gap:12px; margin-bottom:4px;}
.fd-club{font-family:var(--font-display); font-size:30px; line-height:.96; text-transform:uppercase; letter-spacing:.01em;}
.fd-club.spinning{filter:blur(.4px); opacity:.55;}
.fd-season-row{display:flex; align-items:center; gap:9px; margin-bottom:16px;}
.fd-season{font-family:var(--font-mono); font-size:14px; font-weight:600; color:var(--ink-soft); letter-spacing:.04em;}
.fd-runtag{font-family:var(--font-mono); font-size:9.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border-radius:5px; color:#fff;}
.fd-runtag.champ{background:var(--done);} .fd-runtag.final{background:var(--talks);} .fd-runtag.semi{background:var(--interest);} .fd-runtag.qf{background:var(--ink-soft);}

.fd-cands{display:flex; flex-direction:column; gap:7px; max-height:none;}
.fd-cand{display:flex; align-items:center; gap:11px; padding:10px 12px; background:var(--bg); border:1px solid var(--line); border-radius:11px; transition:.14s; text-align:left; width:100%;}
.fd-cand.elig{cursor:pointer;}
.fd-cand.elig:hover{border-color:var(--ink); transform:translateX(2px); background:var(--surface);}
.fd-cand.inelig{opacity:.42; cursor:not-allowed;}
.fd-cand-pos{display:flex; flex-wrap:wrap; align-items:center; align-content:center; justify-content:center; gap:3px; min-width:56px; max-width:84px; font-family:var(--font-mono); color:var(--ink-soft);}
.fd-cand-pos .pos{font-size:8.5px; font-weight:600; letter-spacing:.03em; color:var(--ink-faint); background:var(--surface); border:1px solid var(--line); border-radius:4px; padding:2px 4px; line-height:1.1;}
.fd-cand-pos .pos.primary{color:var(--ink); border-color:var(--line-strong);}
.fd-cand-name{font-weight:700; font-size:14px; color:var(--ink); flex:1; letter-spacing:-.01em;}
.fd-cand-name .pp{display:block; font-family:var(--font-mono); font-weight:500; font-size:9.5px; color:var(--ink-faint); letter-spacing:.03em; margin-top:1px; text-transform:none;}
.fd-rate{font-family:var(--font-mono); font-weight:600; font-size:15px; min-width:34px; height:30px; padding:0 8px; border-radius:7px; display:flex; align-items:center; justify-content:center; color:#fff;}
.fd-rate.hide{background:var(--bg); color:var(--ink-faint); border:1px dashed var(--line-strong);}

.fd-spin-foot{display:flex; align-items:center; gap:10px; margin-top:16px; padding-top:15px; border-top:1px dashed var(--line);}
.fd-respin{font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:10px 15px; border-radius:10px; border:1px solid var(--ink); background:var(--ink); color:#fff; transition:.15s; display:inline-flex; align-items:center; gap:8px;}
.fd-respin:hover:not(:disabled){transform:translateY(-1px);}
.fd-respin:disabled{opacity:.35; cursor:not-allowed; background:var(--surface); color:var(--ink-faint); border-color:var(--line-strong);}
.fd-respin.spin svg{animation:spin .7s linear infinite;}
.fd-spin-note{font-size:11.5px; color:var(--ink-faint); line-height:1.4;}

/* ===========================================================================
   PITCH
   ========================================================================= */
.fd-pitchwrap{background:linear-gradient(var(--surface),var(--surface)) padding-box, var(--ucl-border) border-box; border:2px solid transparent; border-radius:16px; padding:16px; box-shadow:var(--shadow-flush);}
.fd-pitch{position:relative; width:100%; max-width:470px; margin:0 auto; aspect-ratio:68/100; border-radius:12px; overflow:hidden;
  background:repeating-linear-gradient(var(--pitch) 0 9.09%, var(--pitch-2) 9.09% 18.18%);}
.fd-pitch svg.lines{position:absolute; inset:0; width:100%; height:100%;}
.fd-slot{position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; gap:4px; width:88px;}
.fd-chip{width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:600; font-size:15px; color:#fff; border:2px solid rgba(255,255,255,.85); box-shadow:0 4px 12px rgba(0,0,0,.35); transition:.18s; position:relative;}
.fd-slot.empty .fd-chip{background:rgba(255,255,255,.10); border-style:dashed; border-color:rgba(255,255,255,.5); color:rgba(255,255,255,.75); font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:.04em;}
.fd-slot.current .fd-chip{border-color:#ffd34d; box-shadow:0 0 0 4px rgba(255,211,77,.28), 0 4px 12px rgba(0,0,0,.4); animation:pulseY 1.5s infinite;}
.fd-slot .fd-chip.hide{background:#3a4754; color:#cdd3da;}
.fd-pname{font-family:var(--font-ui); font-weight:700; font-size:10.5px; color:#fff; text-align:center; line-height:1.05; text-shadow:0 1px 3px rgba(0,0,0,.7); max-width:92px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.fd-pmeta{font-family:var(--font-mono); font-size:8px; color:rgba(255,255,255,.7); text-align:center; letter-spacing:.04em; text-shadow:0 1px 2px rgba(0,0,0,.7);}
.fd-pitch-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.fd-pitch-form{font-family:var(--font-mono); font-size:12px; font-weight:600; letter-spacing:.08em; color:var(--ink); background:var(--bg); border:1px solid var(--line); border-radius:7px; padding:5px 10px;}
.fd-pitch-tot{font-family:var(--font-mono); font-size:11px; color:var(--ink-soft);}
.fd-pitch-tot b{font-size:15px; color:var(--ink);}

/* ===========================================================================
   RESULTS
   ========================================================================= */
.fd-result{display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:20px; align-items:start;}
@media(max-width:560px){.fd-result{grid-template-columns:1fr;}}
.fd-verdict{background:var(--ucl); background-color:#0b1648; color:#fff; border-radius:16px; padding:24px; position:relative; overflow:hidden;}
.fd-verdict .kick{color:rgba(255,255,255,.55);}
.fd-grade{display:flex; align-items:center; gap:18px; margin:8px 0 14px;}
.fd-grade .g{font-family:var(--font-display); font-size:84px; line-height:.8; letter-spacing:.01em;}
.fd-grade .gr{display:flex; flex-direction:column; gap:5px;}
.fd-result-head{font-family:var(--font-display); font-size:30px; line-height:.95; text-transform:uppercase;}
.fd-record-pills{display:flex; gap:8px; flex-wrap:wrap; margin-top:4px;}
.fd-rp{font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:.06em; padding:5px 10px; border-radius:6px; background:rgba(255,255,255,.1); color:#fff;}
.fd-verdict-line{font-size:14px; line-height:1.5; color:#dfe3e8; border-top:1px solid rgba(255,255,255,.14); padding-top:16px; margin-top:4px;}
.fd-stat-row{display:flex; gap:10px; margin:16px 0 0;}
.fd-stat{flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:11px 13px;}
.fd-stat .n{font-family:var(--font-mono); font-size:26px; font-weight:600; color:#fff;}
.fd-stat .l{font-family:var(--font-mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.5); margin-top:2px;}

.fd-run{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:18px;}
.fd-run-h{font-family:var(--font-display); font-size:18px; text-transform:uppercase; letter-spacing:.02em; margin-bottom:12px;}
.fd-match{display:flex; align-items:center; gap:11px; padding:8px 4px; border-bottom:1px solid var(--line); font-size:13px;}
.fd-match:last-child{border-bottom:none;}
.fd-match .rnd{font-family:var(--font-mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint); width:74px; flex-shrink:0;}
.fd-match .opp{flex:1; display:flex; align-items:center; gap:8px; font-weight:600; color:var(--ink);}
.fd-match .sc{font-family:var(--font-mono); font-weight:600; font-size:14px; color:var(--ink); letter-spacing:.04em;}
.fd-match .sc .pens{margin-left:6px; font-family:var(--font-ui); font-size:8.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint); border:1px solid var(--line-strong); border-radius:4px; padding:1px 4px; vertical-align:middle;}
.fd-match .rr{width:22px; height:22px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:600; font-size:11px; color:#fff; flex-shrink:0;}
.fd-match .rr.W{background:var(--done);} .fd-match .rr.D{background:var(--talks);} .fd-match .rr.L{background:var(--breaking);}
.fd-match .pens{font-family:var(--font-mono); font-size:9px; color:var(--ink-faint); letter-spacing:.04em;}

.fd-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:20px;}
.fd-btn{font-family:var(--font-mono); font-size:12px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:13px 20px; border-radius:11px; border:1px solid var(--ink); background:var(--ink); color:#fff; transition:.15s; display:inline-flex; align-items:center; gap:9px;}
.fd-btn:hover{transform:translateY(-1px);}
.fd-btn.ghost{background:var(--surface); color:var(--ink); border-color:var(--line-strong);}
.fd-btn.ghost:hover{border-color:var(--ink);}

/* reveal overlay note */
.fd-reveal-note{text-align:center; font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); margin:14px 0 0;}

/* ===========================================================================
   ANIMATIONS
   ========================================================================= */
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5);}70%{box-shadow:0 0 0 6px rgba(22,163,74,0);}100%{box-shadow:0 0 0 0 rgba(22,163,74,0);}}
@keyframes pulse-w{0%{opacity:1;}50%{opacity:.35;}100%{opacity:1;}}
@keyframes pulseY{0%{box-shadow:0 0 0 0 rgba(255,211,77,.5),0 4px 12px rgba(0,0,0,.4);}70%{box-shadow:0 0 0 9px rgba(255,211,77,0),0 4px 12px rgba(0,0,0,.4);}100%{box-shadow:0 0 0 0 rgba(255,211,77,0),0 4px 12px rgba(0,0,0,.4);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes rise{from{transform:translateY(10px); opacity:0;}to{transform:translateY(0); opacity:1;}}
@keyframes pop{0%{transform:scale(.6); opacity:0;}60%{transform:scale(1.08);}100%{transform:scale(1); opacity:1;}}
.rise{animation:rise .42s cubic-bezier(.2,.7,.3,1) both;}
.pop{animation:pop .34s cubic-bezier(.2,.7,.3,1) both;}
@media (prefers-reduced-motion: reduce){.rise,.pop{animation:none;}}

/* Oswald display weight */
.fd-logo,.fd-panel-h,.fd-club,.fd-result-head,.fd-run-h,.fd-grade .g{font-weight:700;}
.fd-pitch-form{font-weight:600;}

/* ---- draft: instruction / place / move ---- */
.fd-target .tip{font-family:var(--font-ui); font-size:12px; color:var(--ink-soft); letter-spacing:-.01em;}
.fd-target.act .slot{background:#ffd34d; color:var(--ink);}
.fd-cancel{margin-left:4px; width:24px; height:24px; border-radius:6px; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-soft); font-size:16px; line-height:1; display:flex; align-items:center; justify-content:center;}
.fd-cancel:hover{border-color:var(--ink); color:var(--ink);}
.fd-hint{font-family:var(--font-mono); font-size:11px; letter-spacing:.01em; color:var(--blocked); background:#fbe9ea; border:1px solid #f3cdcf; border-radius:8px; padding:8px 11px; margin-bottom:12px; animation:rise .3s ease both;}
.fd-cand.sel{border-color:var(--ink); background:var(--surface); box-shadow:0 0 0 2px rgba(11,14,20,.12);}

/* ---- interactive pitch ---- */
.fd-slot.clickable{cursor:pointer;}
.fd-slot.filled.clickable:hover .fd-chip{transform:scale(1.07);}
.fd-slot.hl{cursor:pointer;}
.fd-slot.hl .fd-chip{border-color:#ffd34d; box-shadow:0 0 0 4px rgba(255,211,77,.32), 0 4px 12px rgba(0,0,0,.4); animation:pulseY 1.4s infinite;}
.fd-slot.empty.hl .fd-chip{background:rgba(255,211,77,.20); border-style:solid; border-color:#ffd34d; color:#ffe08a; font-size:18px;}
.fd-slot.src .fd-chip{box-shadow:0 0 0 4px rgba(37,99,235,.45), 0 4px 12px rgba(0,0,0,.4); border-color:#8fb6ff;}

/* run-tag extra states + leg label */
.fd-runtag.r16{background:#6b7280;} .fd-runtag.group{background:#9aa1ac;}
.fd-match .rnd .leg{color:var(--ink-faint);}

/* ===========================================================================
   ADDITIONS — match scorers, sequential reveal, awards, overall breakdown
   ========================================================================= */

/* match rows now wrap a scoreline + its scorer list */
.fd-matchrow{border-bottom:1px solid var(--line);}
.fd-matchrow:last-child{border-bottom:none;}
.fd-matchrow .fd-match{border-bottom:none;}
.fd-matchrow.latest{animation:rise .4s cubic-bezier(.2,.7,.3,1) both;}
.fd-matchrow.latest .fd-match{background:rgba(37,99,235,.06); border-radius:8px;}

.fd-scorers{display:flex; flex-wrap:wrap; gap:5px 14px; padding:0 4px 9px 85px;}
.fd-scorer{display:inline-flex; align-items:center; gap:5px; font-family:var(--font-mono); font-size:10.5px; color:var(--ink-soft); letter-spacing:.01em;}
.fd-scorer .as{color:var(--ink-faint);}
.fd-ball{width:11px; height:11px; flex-shrink:0;}
@media(max-width:560px){.fd-scorers{padding-left:74px;}}

/* overall breakdown pills (inside the dark verdict card) */
.fd-ovr-breakdown{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;}
.fd-ovr-pill{font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:.08em; padding:6px 11px; border-radius:6px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.7);}
.fd-ovr-pill b{color:#fff; font-size:13px; margin-left:3px;}

/* live simulation card (shown while matches reveal one by one) */
.fd-verdict.live{display:flex; flex-direction:column; gap:18px;}
.fd-live{display:flex; align-items:center; justify-content:space-between; gap:20px;}
.fd-live-count{font-family:var(--font-mono); font-weight:600; color:rgba(255,255,255,.5); font-size:16px; display:flex; align-items:baseline; gap:6px;}
.fd-live-count b{font-family:var(--font-display); font-size:54px; line-height:1; color:#fff; font-weight:700; letter-spacing:.02em;}
.fd-live-count .of{font-size:15px;}
.fd-live-meta{display:flex; flex-direction:column; align-items:flex-end; gap:8px;}
.fd-live-round{font-family:var(--font-mono); font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#fff; animation:pulse-w 1.4s ease-in-out infinite;}
.fd-skip{align-self:flex-start;}

/* end-of-run awards: best player / top scorer / top playmaker */
.fd-awards{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:16px;}
.fd-award{display:flex; flex-direction:column; gap:5px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px 18px;}
.fd-award-l{font-family:var(--font-mono); font-size:9.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint);}
.fd-award-name{font-family:var(--font-display); font-size:23px; font-weight:700; text-transform:uppercase; letter-spacing:.01em; color:var(--ink); line-height:1.05;}
.fd-award-stat{font-family:var(--font-mono); font-size:15px; font-weight:600; letter-spacing:.02em;}
.fd-award-meta{font-family:var(--font-mono); font-size:10.5px; color:var(--ink-soft); letter-spacing:.03em;}
@media(max-width:720px){.fd-awards{grid-template-columns:1fr;}}

/* ===== group / league table gate + interactive penalty shootout ===== */
.fd-gate{margin-top:16px; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:20px;}
.fd-gate>.fd-btn{width:100%; margin-top:16px;}
.fd-run-empty{font-family:var(--font-mono); font-size:12px; letter-spacing:.04em; color:var(--ink-faint); padding:14px 4px; text-transform:uppercase;}
.fd-gate-out{display:flex; flex-direction:column; gap:6px; align-items:center; text-align:center; padding:14px 0 4px;}
.fd-gate-out-h{font-family:var(--font-display); font-size:26px; text-transform:uppercase; letter-spacing:.02em; color:var(--breaking);}
.fd-gate-out-s{font-size:13px; color:var(--ink-soft);}

.fd-gtable{}
.fd-gt-head{display:flex; flex-direction:column; gap:3px; margin-bottom:13px;}
.fd-gt-title{font-family:var(--font-display); font-size:19px; text-transform:uppercase; letter-spacing:.01em;}
.fd-gt-note{font-size:12px; color:var(--ink-soft); line-height:1.45;}
.fd-gt-rows{display:flex; flex-direction:column; gap:3px; max-height:430px; overflow:auto;}
.fd-gt-row{display:grid; grid-template-columns:30px 1fr 30px 38px; align-items:center; gap:6px; padding:9px 11px; border-radius:9px; background:var(--bg); border:1px solid transparent;}
.fd-gt-row .p{font-family:var(--font-mono); font-weight:700; font-size:13px; color:var(--ink-soft); text-align:center;}
.fd-gt-row .t{font-family:var(--font-ui); font-weight:600; font-size:13.5px; display:flex; align-items:center; gap:8px; min-width:0;}
.fd-gt-row .t .tag{font-family:var(--font-mono); font-size:8.5px; font-weight:700; letter-spacing:.08em; background:var(--ink); color:#fff; border-radius:4px; padding:2px 5px;}
.fd-gt-row .v{font-family:var(--font-mono); font-size:12px; color:var(--ink-faint); text-align:center;}
.fd-gt-row .v.pts{color:var(--ink); font-weight:700; font-size:13px;}
.fd-gt-row.hd{background:transparent; padding:2px 11px 4px;}
.fd-gt-row.hd .p,.fd-gt-row.hd .v,.fd-gt-row.hd .t{font-family:var(--font-mono); font-size:9.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint);}
.fd-gt-row.q{border-left:3px solid var(--done);}
.fd-gt-row.po{border-left:3px solid var(--talks);}
.fd-gt-row.e{border-left:3px solid var(--line-strong);}
.fd-gt-row.x{opacity:.62;}
.fd-gt-row.you{background:#fff; border-color:var(--interest); box-shadow:0 0 0 1px var(--interest) inset;}
.fd-gt-row.you .p{color:var(--interest);}
.fd-gt-cut{display:flex; align-items:center; gap:10px; margin:3px 2px;}
.fd-gt-cut::before,.fd-gt-cut::after{content:""; height:1px; flex:1; background:repeating-linear-gradient(90deg,var(--line-strong) 0 5px,transparent 5px 9px);}
.fd-gt-cut span{font-family:var(--font-mono); font-size:8.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint);}

.fd-shootout{margin-top:16px; background:var(--pitch); color:#fff; border-radius:16px; padding:22px; text-align:center;}
.fd-pk-head{display:flex; flex-direction:column; gap:3px; margin-bottom:14px;}
.fd-pk-kick{font-family:var(--font-display); font-size:22px; text-transform:uppercase; letter-spacing:.03em;}
.fd-pk-sub{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.05em; color:rgba(255,255,255,.6); text-transform:uppercase;}
.fd-pk-score{display:flex; align-items:center; justify-content:center; gap:18px; margin:6px 0 14px;}
.fd-pk-side{display:flex; align-items:center; gap:10px;}
.fd-pk-side .lab{font-family:var(--font-mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:rgba(255,255,255,.7);}
.fd-pk-side .sc{font-family:var(--font-display); font-size:46px; line-height:1;}
.fd-pk-x{font-family:var(--font-display); font-size:28px; color:rgba(255,255,255,.5);}
.fd-pk-dots{display:flex; flex-direction:column; gap:7px; align-items:center; margin-bottom:16px;}
.fd-pk-dots .row{display:flex; gap:7px;}
.fd-pk-dot{width:13px; height:13px; border-radius:50%; border:1.5px solid rgba(255,255,255,.32); box-sizing:border-box;}
.fd-pk-dot.g{background:var(--done); border-color:var(--done);}
.fd-pk-dot.m{background:var(--breaking); border-color:var(--breaking);}
.fd-pk-goalwrap{position:relative; max-width:360px; margin:2px auto 14px;}
.fd-pk-goal{width:100%; height:auto; display:block; overflow:visible;}
.fd-pk-zone{fill:transparent; cursor:default;}
.fd-pk-zone.live{cursor:pointer;}
.fd-pk-zone.live:hover{fill:rgba(37,99,235,.30); stroke:rgba(255,255,255,.7); stroke-width:1.5;}
.fd-pk-zone.hover{fill:rgba(57,224,196,.34); stroke:rgba(255,255,255,.8); stroke-width:1.5;}
.fd-pk-zone.picked{fill:rgba(37,99,235,.22);}
.fd-pk-ball,.fd-pk-gloves{transition:transform .55s cubic-bezier(.34,1.4,.5,1);}
.fd-pk-gloves{touch-action:none;}
.fd-pk-gloves:active{cursor:grabbing;}
.fd-pk-grabring{animation:pk-grab 1.4s ease-in-out infinite;}
@keyframes pk-grab{0%,100%{opacity:.25; r:24;} 50%{opacity:.5; r:28;}}
.fd-pk-flash{position:absolute; top:38%; left:0; right:0; text-align:center; font-family:var(--font-display); font-size:44px; text-transform:uppercase; letter-spacing:.03em; pointer-events:none; animation:pk-pop .3s ease both .45s; opacity:0;}
.fd-pk-flash.g{color:#5ee08a; text-shadow:0 2px 18px rgba(94,224,138,.5);}
.fd-pk-flash.s{color:#ff7a7c; text-shadow:0 2px 18px rgba(255,122,124,.5);}
.fd-pk-aim{display:flex; flex-direction:column; gap:7px; align-items:center; min-height:46px;}
.fd-pk-prompt{font-size:15px; line-height:1.4;}
.fd-pk-prompt b{font-weight:700;}
.fd-pk-hint{font-family:var(--font-mono); font-size:10px; letter-spacing:.04em; color:rgba(255,255,255,.55); text-transform:uppercase;}
.fd-pk-result{display:flex; flex-direction:column; gap:14px; align-items:center;}
.fd-pk-verdict{font-family:var(--font-display); font-size:27px; text-transform:uppercase; letter-spacing:.02em;}
.fd-pk-verdict.win{color:#5ee08a;}
.fd-pk-verdict.lose{color:#ff7a7c;}
.fd-pk-result .fd-btn{min-width:200px;}
@keyframes pk-pop{from{transform:scale(.6); opacity:0;} to{transform:scale(1); opacity:1;}}

/* ===== club badges (original monograms) ===== */
.fd-cbadge{display:inline-flex; align-items:center; justify-content:center; border-radius:50%; font-family:var(--font-mono); font-weight:700; line-height:1; border:1.5px solid; flex:none; letter-spacing:-.03em; overflow:hidden;}

/* ===== knockout bracket ===== */
.fd-bk-head{display:flex; flex-direction:column; gap:3px; margin-bottom:13px;}
.fd-bk-title{font-family:var(--font-display); font-size:19px; text-transform:uppercase; letter-spacing:.01em;}
.fd-bk-note{font-size:11.5px; color:var(--ink-soft); line-height:1.45;}
.fd-bracket{display:flex; align-items:stretch; gap:10px; overflow-x:auto; padding:4px 2px 10px; -webkit-overflow-scrolling:touch;}
.fd-bk-col{display:flex; flex-direction:column; min-width:124px; flex:none;}
.fd-bk-col.po{min-width:120px;}
.fd-bk-h{font-family:var(--font-mono); font-size:9.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); text-align:center; margin-bottom:8px;}
.fd-bk-ties{display:flex; flex-direction:column; justify-content:space-around; flex:1; gap:8px;}
.fd-bk-tie{background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:4px; display:flex; flex-direction:column; gap:3px;}
.fd-bk-tie.you{border-color:var(--interest); box-shadow:0 0 0 1px var(--interest) inset; background:#fff;}
.fd-bk-team{display:flex; align-items:center; gap:6px; padding:3px 4px; border-radius:6px; min-width:0;}
.fd-bk-team .nm{font-family:var(--font-ui); font-size:11px; font-weight:600; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.fd-bk-team.win .nm{color:var(--ink); font-weight:700;}
.fd-bk-team.you .nm{color:var(--interest); font-weight:800;}
.fd-bk-col.final .fd-bk-tie{border-color:var(--talks);}

/* ===== knockout match sim (roomier) ===== */
.fd-result.nopitch{grid-template-columns:1fr;}
.fd-run.ko{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px;}
.fd-run.ko .fd-run-h{font-size:13px; letter-spacing:.04em;}

/* ===== persistent lineup (left) + refreshing panel (right) ===== */
.fd-stage-right{min-width:0;}                 /* lets the bracket scroll inside the grid cell */
.fd-stage-right .fd-gate{margin-top:0;}
.fd-verdict.summary{padding:20px;}
.fd-verdict.summary .fd-grade{margin:6px 0 12px;}
.fd-verdict.summary .fd-grade .g{font-size:58px;}
.fd-verdict.summary .fd-awards{grid-template-columns:1fr; gap:10px; margin-top:16px;}
.fd-verdict.summary .fd-award{padding:12px 14px;}
.fd-verdict.summary .fd-award-name{font-size:20px;}

/* ===== live final (animated match) ===== */
.fd-lf{display:flex; flex-direction:column; gap:12px;}
.fd-lf-board{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; background:var(--pitch); color:#fff; border-radius:14px; padding:16px 12px;}
.fd-lf-team{display:flex; align-items:center; gap:7px; font-family:var(--font-display); font-size:14px; text-transform:uppercase; letter-spacing:.02em; min-width:0;}
.fd-lf-team span{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.fd-lf-team.away{justify-content:flex-end;}
.fd-lf-score{display:flex; align-items:center; gap:7px; font-family:var(--font-display); font-size:32px; position:relative; padding-top:6px;}
.fd-lf-score .sep{opacity:.55; font-size:22px;}
.fd-lf-score .clk{position:absolute; top:-10px; left:50%; transform:translateX(-50%); font-family:var(--font-mono); font-size:9.5px; font-weight:700; letter-spacing:.12em; color:#063; background:#5ee0b0; padding:2px 8px; border-radius:99px;}
.fd-lf-feed{display:flex; flex-direction:column; gap:7px; max-height:280px; overflow-y:auto; padding-right:2px;}
.fd-lf-line{display:flex; gap:9px; align-items:baseline; font-size:13px; line-height:1.42; padding:8px 11px; border-radius:9px; background:var(--bg); border:1px solid var(--line); animation:lf-in .28s ease;}
.fd-lf-line .m{font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--ink-faint); min-width:30px; flex:none;}
.fd-lf-line .tx{color:var(--ink-soft);}
.fd-lf-line.goal{background:#0b1e16; border-color:transparent;}
.fd-lf-line.goal .tx{color:#fff; font-weight:600;}
.fd-lf-line.goal .m{color:#5ee0b0;}
.fd-lf-line.phase{background:transparent; border-style:dashed;}
.fd-lf-line.phase .tx{font-family:var(--font-mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-faint);}
@keyframes lf-in{from{opacity:0; transform:translateY(-5px);} to{opacity:1; transform:none;}}
.fd-continue{width:100%; margin-top:14px;}

/* ===== Champions-League gradient behind the bracket ===== */
.fd-gate.ucl{background:var(--ucl); background-color:#0b1648; border-color:transparent;}
.fd-gate.ucl .fd-bk-title{color:#fff;}
.fd-gate.ucl .fd-bk-note{color:rgba(255,255,255,.72);}
.fd-gate.ucl .fd-bk-h{color:rgba(255,255,255,.5);}
.fd-gate.ucl > .fd-btn{background:#fff; color:#10184a; border-color:#fff;}
.fd-gate.ucl > .fd-btn:hover{background:#eef1ff;}

/* ===== W-D-L counter + skip under the lineup ===== */
.fd-stage-left{display:flex; flex-direction:column; gap:12px; min-width:0;}
.fd-livebar{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:0 2px;}
.fd-wdl{display:flex; gap:6px;}
.fd-wdl .fd-rp{font-family:var(--font-mono); font-size:11.5px; font-weight:700; letter-spacing:.03em; padding:6px 11px; border-radius:7px; border:1px solid var(--line);}
.fd-wdl .fd-rp.w{color:var(--done); background:rgba(22,163,74,.10); border-color:rgba(22,163,74,.26);}
.fd-wdl .fd-rp.d{color:var(--talks); background:rgba(224,134,0,.10); border-color:rgba(224,134,0,.26);}
.fd-wdl .fd-rp.l{color:var(--breaking); background:rgba(238,43,45,.10); border-color:rgba(238,43,45,.24);}
.fd-livebar .fd-skip{align-self:center; padding:10px 16px;}

/* ===== share card overlay ===== */
.fd-share-overlay{position:fixed; inset:0; z-index:50; background:rgba(8,10,30,.72); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:20px; animation:rise .25s ease both;}
.fd-share-card{position:relative; width:100%; max-width:420px; max-height:92vh; overflow-y:auto; background:var(--ucl); background-color:#0b1648; border-radius:20px; padding:22px; color:#fff; box-shadow:0 30px 70px -20px rgba(0,0,0,.7);}
.fd-share-x{position:absolute; top:12px; right:12px; width:30px; height:30px; border-radius:50%; border:1px solid rgba(255,255,255,.25); background:rgba(0,0,0,.5); color:#fff; font-size:20px; line-height:1; display:flex; align-items:center; justify-content:center; z-index:2; cursor:pointer;}
.fd-share-x:hover{background:rgba(0,0,0,.7);}
.fd-share-modal{position:relative; width:100%; max-width:430px; max-height:94vh; overflow-y:auto; display:flex; flex-direction:column; align-items:center;}
.fd-share-img{width:100%; height:auto; border-radius:18px; display:block; box-shadow:0 30px 70px -20px rgba(0,0,0,.7); -webkit-user-select:none; user-select:none; -webkit-touch-callout:default;}
.fd-share-gen{width:100%; aspect-ratio:1080 / 1350; border-radius:18px; background:rgba(255,255,255,.06); display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.7); font-family:var(--font-ui); font-size:14px;}
.fd-share-top{display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-bottom:16px;}
.fd-share-logo{font-family:var(--font-display); font-weight:700; font-size:34px; line-height:.8; text-transform:uppercase;}
.fd-share-logo .dot{color:#5ee0b0;}
.fd-share-finish{display:flex; align-items:center; gap:10px;}
.fd-share-finish .g{font-family:var(--font-display); font-weight:700; font-size:40px; line-height:.8;}
.fd-share-finish .lab{font-family:var(--font-display); font-size:14px; text-transform:uppercase; letter-spacing:.02em; max-width:120px; line-height:1.05; color:rgba(255,255,255,.92);}
.fd-share-card .fd-pitchwrap{background:linear-gradient(#0c1330,#0c1330) padding-box, var(--ucl-border) border-box;}
.fd-share-card .fd-pitch-tot{color:rgba(255,255,255,.82);}
.fd-share-card .fd-pitch-tot b{color:#fff;}
.fd-share-actions{display:flex; gap:10px; justify-content:center; align-items:center; margin-top:16px;}
.fd-shbtn{display:inline-flex; align-items:center; justify-content:center; gap:8px; height:46px; min-width:46px; padding:0; border:0; border-radius:999px; cursor:pointer; color:#fff; font-family:var(--font-ui); font-weight:700; font-size:14px; transition:transform .12s, filter .12s;}
.fd-shbtn svg{width:20px; height:20px; display:block;}
.fd-shbtn:hover{filter:brightness(1.08);}
.fd-shbtn:active{transform:scale(.94);}
.fd-shbtn.dl{padding:0 18px; background:#fff; color:#0b1240;}
.fd-shbtn.x{width:46px; background:#000;}
.fd-shbtn.ig{width:46px; background:linear-gradient(45deg,#f9ce34 5%,#ee2a7b 50%,#6228d7 95%);}
.fd-shbtn.fb{width:46px; background:#1877f2;}
.fd-share-cap{text-align:center; font-size:11px; color:rgba(255,255,255,.6); margin-top:11px; letter-spacing:.01em;}
.fd-share-rec{display:flex; flex-wrap:wrap; gap:7px; margin-top:16px;}
.fd-share-rec .fd-rp{font-family:var(--font-mono); font-size:11.5px; font-weight:600; letter-spacing:.04em; padding:6px 11px; border-radius:7px; background:rgba(255,255,255,.12); color:#fff;}
.fd-share-rec .fd-rp.gold{background:#e3b341; color:#3a2a00;}
.fd-share-foot{display:flex; align-items:center; justify-content:center; gap:12px; margin-top:18px; padding-top:14px; border-top:1px solid rgba(255,255,255,.14);}
.fd-share-foot span{font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:#fff;}

/* ===== shiny gold (96-99) with a moving shine ===== */
.fd-chip.gold, .fd-rate.gold, .fd-tier.gold{
  position:relative; overflow:hidden;
  background:linear-gradient(135deg,#9a6b06 0%,#e8c04a 30%,#fff1a8 50%,#e8c04a 70%,#9a6b06 100%);
  color:#46330a; text-shadow:0 1px 0 rgba(255,255,255,.3);
}
.fd-chip.gold{border-color:rgba(255,238,170,.95); box-shadow:0 0 0 1px rgba(255,220,120,.35), 0 4px 12px rgba(120,80,0,.45);}
.fd-chip.gold::after, .fd-rate.gold::after, .fd-tier.gold::after{
  content:''; position:absolute; top:-10%; left:-85%; width:55%; height:120%;
  background:linear-gradient(100deg, transparent 0%, rgba(255,255,255,.92) 50%, transparent 100%);
  transform:skewX(-22deg); animation:goldshine 2.4s ease-in-out infinite; pointer-events:none;
}
@keyframes goldshine{0%{left:-85%;} 55%,100%{left:155%;}}
@media (prefers-reduced-motion: reduce){.fd-chip.gold::after,.fd-rate.gold::after,.fd-tier.gold::after{animation:none; opacity:0;}}

/* ===== play-by-play pitch map (the final) ===== */
.fd-pbp{position:relative; border-radius:14px; overflow:hidden; margin-top:4px; background:repeating-linear-gradient(90deg,#0f3a26 0 28px,#0d3422 28px 56px);}
.fd-pbp-pitch{display:block; width:100%; height:auto;}
.fd-pbp-line{fill:none; stroke:rgba(255,255,255,.32); stroke-width:1.4;}
.fd-pbp-dot{fill:rgba(255,255,255,.5); stroke:none;}
.fd-pbp-goalpost{fill:rgba(255,255,255,.6); stroke:none;}
.fd-pbp-chain{fill:none; stroke:rgba(255,255,255,.82); stroke-width:1.4; stroke-dasharray:2 4.5; stroke-linecap:round; animation:pbptrail .4s ease both;}
.fd-pbp-cdot{fill:#fff; stroke:none; animation:pbptrail .4s ease both;}
@keyframes pbptrail{from{opacity:0;}to{opacity:.92;}}
.fd-pbp-dir{transition:transform .55s cubic-bezier(.34,1,.5,1);}
.fd-pbp-dir-shaft{stroke:rgba(15,17,24,.42); stroke-width:7; stroke-linecap:round;}
.fd-pbp-dir-head{fill:rgba(15,17,24,.42);}
.fd-pbp-ball{transition:transform .5s cubic-bezier(.34,1,.5,1);}
.fd-pbp-ball .bg{fill:#fff; stroke:#1c1f26; stroke-width:1.1; filter:drop-shadow(0 1px 2px rgba(0,0,0,.55));}
.fd-pbp-ball .pent{fill:#171a20;}
.fd-pbp-ball.goal .bg{fill:#fff;}
.fd-pbp-flash{fill:none; stroke:#ffd84d; stroke-width:2.5; animation:pbpflash .95s ease-out forwards;}
@keyframes pbpflash{0%{r:4; opacity:1; stroke-width:3.5;} 100%{r:42; opacity:0; stroke-width:.4;}}
.fd-pbp-pill{position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:2; display:flex; align-items:center; gap:9px; background:rgba(7,14,28,.85); border:1px solid rgba(255,255,255,.16); border-radius:99px; padding:6px 16px 6px 6px; color:#fff; max-width:90%; box-shadow:0 6px 18px rgba(0,0,0,.45);}
.fd-pbp-pill .t{display:flex; flex-direction:column; line-height:1.06; min-width:0;}
.fd-pbp-pill .act{font-family:var(--font-display); font-size:15px; text-transform:uppercase; letter-spacing:.01em; white-space:nowrap;}
.fd-pbp-pill .pl{font-family:var(--font-ui); font-size:11px; color:rgba(255,255,255,.72); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.fd-pbp-pill.goal{border-color:#5ee0b0; box-shadow:0 0 0 1px #5ee0b0, 0 6px 18px rgba(0,0,0,.45);}
.fd-pbp-pill.goal .act{color:#5ee0b0;}
.fd-skipgame{margin-top:12px; padding:9px 15px;}
@media (prefers-reduced-motion: reduce){.fd-pbp-dir,.fd-pbp-ball{transition:none;} .fd-pbp-flash{animation:none; opacity:0;} .fd-pbp-flame,.fd-pbp-confetti{display:none;}}
/* goal celebration */
.fd-pbp-goalcel{position:absolute; inset:0; z-index:3; display:flex; align-items:center; justify-content:center; pointer-events:none; overflow:hidden; animation:celfade 1.5s ease both;}
.fd-pbp-goalcel .glow{position:absolute; inset:0; background:radial-gradient(circle at center,rgba(255,216,77,.34),rgba(8,28,18,.4) 70%);}
.fd-pbp-goalcel .gt{position:relative; font-family:var(--font-display); font-weight:700; font-size:clamp(34px,9vw,56px); letter-spacing:.03em; text-transform:uppercase; color:#fff; text-shadow:0 3px 14px rgba(0,0,0,.55),0 0 24px rgba(255,216,77,.6); animation:celpop .5s cubic-bezier(.2,1.5,.4,1) both;}
.fd-pbp-flame{position:absolute; bottom:-6px; border-radius:7px 7px 2px 2px; background:linear-gradient(#fff8d4,#ffd84d 38%,#ff8a1e 76%,#ff5a1e); filter:blur(.3px); transform-origin:bottom center; animation:celflame 1.1s ease-out both;}
.fd-pbp-confetti{position:absolute; border-radius:1px; animation:celconf 1.4s ease-out both;}
@keyframes celfade{0%{opacity:0;}12%{opacity:1;}78%{opacity:1;}100%{opacity:0;}}
@keyframes celpop{0%{transform:scale(.5) translateY(6px); opacity:0;}55%{transform:scale(1.16); opacity:1;}100%{transform:scale(1);}}
@keyframes celflame{0%{height:0; opacity:0;}22%{opacity:1;}55%{height:64%;}100%{height:30%; opacity:0;}}
@keyframes celconf{0%{transform:translateY(0) rotate(0); opacity:1;}100%{transform:translateY(150px) rotate(260deg); opacity:0;}}
/* corner / goal-kick restart indicator */
.fd-pbp-restart{position:absolute; top:8px; left:50%; transform:translateX(-50%); z-index:3; display:flex; align-items:center; gap:7px; padding:5px 12px; border-radius:999px; background:rgba(8,28,18,.82); border:1px solid rgba(255,255,255,.28); color:#fff; font-family:var(--font-ui); font-weight:700; font-size:12px; letter-spacing:.02em; box-shadow:0 6px 16px rgba(0,0,0,.3); animation:restartpop .26s cubic-bezier(.2,1.4,.4,1) both;}
.fd-pbp-restart .ico{font-size:13px; line-height:1;}
.fd-pbp-restart.corner .ico{color:#ffd84d;}
@keyframes restartpop{0%{opacity:0; transform:translateX(-50%) translateY(-6px) scale(.9);}100%{opacity:1; transform:translateX(-50%) translateY(0) scale(1);}}
/* aggregate score chips */
.fd-agg{font-family:var(--font-mono); font-size:10px; font-weight:600; color:var(--talks); background:rgba(224,134,0,.1); border:1px solid rgba(224,134,0,.28); border-radius:5px; padding:1px 5px; white-space:nowrap;}
.fd-lf-agg{text-align:center; font-family:var(--font-ui); font-size:12px; color:var(--ink-soft); margin-top:5px; letter-spacing:.01em;}
.fd-lf-agg b{font-family:var(--font-mono); color:var(--ink);}
.fd-lf-agg .sub{opacity:.6; font-size:11px;}
@media (prefers-reduced-motion: reduce){.fd-pbp-restart{animation:none;}}

  // ---- derive campaigns + prime table from raw dataset
  function build() {
    const raw = window.CL_CAMPAIGNS || [];
    // raw peak per player (before regrade), so the shift lands their best season on the ceiling
    const rawPeak = {};
    raw.forEach((c) => c.players.forEach((p) => { if (!(p.n in rawPeak) || p.r > rawPeak[p.n]) rawPeak[p.n] = p.r; }));
    const regrade = (name, r) => {
      const ceil = ELITE_CEILING[name];
      if (ceil) return Math.min(99, r + Math.max(0, ceil - rawPeak[name]));
      // gentle nudge for very good but un-listed players; fodder (<80) is untouched
      const bump = r >= 85 ? 3 : r >= 82 ? 2 : r >= 80 ? 1 : 0;
      return Math.min(91, r + bump);
    };
    const campaigns = raw.map((c, i) => ({
      id: i,
      club: c.club,
      season: c.season,
      run: c.run,
      players: c.players.map((p) => ({ ...p, r: regrade(p.n, p.r), groups: groupsFor(p.role), positions: posFor(p.role, p.n) })),
    }));
    // prime: best single-season rating per player name
    const prime = {};
    campaigns.forEach((c) => {
      c.players.forEach((p) => {
        const cur = prime[p.n];
        if (!cur || p.r > cur.r) prime[p.n] = { r: p.r, club: c.club, season: c.season, role: p.role };
      });
    });
    // count appearances (for "seasons" badge)
    const apps = {};
    campaigns.forEach((c) => c.players.forEach((p) => { apps[p.n] = (apps[p.n] || 0) + 1; }));
    return { campaigns, prime, apps };
  }

  function eligible(campaign, group) {
    return campaign.players.filter((p) => p.groups.includes(group));

  // ---- team ratings: line averages (GK folded into defense) + overall.
  //   line rating = (sum of that line's player ratings) / (number in that line)
  //   overall     = mean of attack, midfield, defense line ratings
  function teamRatings(squad) {
    const buckets = { DEF: [], MID: [], ATT: [] };
    squad.forEach((p) => {
      const L = p.line === 'GK' ? 'DEF' : p.line;   // keeper counts toward the defense
      if (buckets[L]) buckets[L].push(p.rating);
    });
    const mean = (arr) => (arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0);
    const def = mean(buckets.DEF), mid = mean(buckets.MID), att = mean(buckets.ATT);
    const lines = [def, mid, att].filter((x) => x > 0);
    const overall = lines.length ? lines.reduce((a, b) => a + b, 0) / lines.length : 0;
    return { def, mid, att, overall };
  }

  // ---- seeded RNG (mulberry32 from string)
  function seed(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) { h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = (h << 13) | (h >>> 19); }
    let a = h >>> 0;
    return function () { a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
  }
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  function weightedPick(items, weightFn, rng) {
    if (!items.length) return null;
    const ws = items.map(weightFn);
    let sum = 0; for (let i = 0; i < ws.length; i++) sum += ws[i];
    if (sum <= 0) return items[Math.floor(rng() * items.length)];
    let r = rng() * sum;
    for (let i = 0; i < items.length; i++) { r -= ws[i]; if (r <= 0) return items[i]; }
    return items[items.length - 1];
  }
  // how likely each player is to score / assist, by line and quality
  const scorerW = (p) => {
    const base = p.line === 'ATT' ? 10 : p.line === 'MID' ? 4.2 : p.line === 'DEF' ? 0.9 : 0.05;
    return base * (0.5 + Math.max(0, p.rating - 68) / 30);
  };
  const assistW = (p) => {
    const base = p.line === 'MID' ? 8 : p.line === 'ATT' ? 5.5 : p.line === 'DEF' ? 1.4 : 0.05;
    return base * (0.5 + Math.max(0, p.rating - 68) / 30);
  };

  // Pick an index from a weighted list (negative weights treated as 0).
  const pickIdx = (rng, ws) => {
    let s = 0; for (let i = 0; i < ws.length; i++) s += Math.max(0, ws[i]);
    let r = rng() * s;
    for (let i = 0; i < ws.length; i++) { r -= Math.max(0, ws[i]); if (r < 0) return i; }
    return ws.length - 1;
  };

  // Realistic scorelines. The result (W/D/L) is already decided; here we only pick
  // goal totals consistent with it. The losing side scores far more often than before
  // (a beaten opponent grabbing a consolation is normal), and stronger sides win by more.
  // Invariants kept exactly: W => gf>ga, D => gf==ga, L => gf<ga (so KO aggregates and
  // the perfect-run logic are unaffected).
  function scoreline(res, str, opp, rng) {
    const atk = clamp((str - 80) / 10, -0.3, 1.1);      // our attacking power
    const oppThreat = clamp((opp - 78) / 10, -0.3, 1.2); // how likely the other side scores
    if (res === 'W') {
      // goals scored by the beaten opponent: 0,1,2,3 — they grab a consolation about half the time
      const ga = pickIdx(rng, [0.50 - oppThreat * 0.18, 0.33 + oppThreat * 0.04, 0.13 + oppThreat * 0.10, 0.04 + oppThreat * 0.04]);
      // winning margin >=1, mostly 1-2, bigger when we are clearly the stronger side
      const margin = 1 + pickIdx(rng, [0.58 - atk * 0.14, 0.28 + atk * 0.05, 0.10 + atk * 0.06, 0.03 + atk * 0.02, 0.01 + atk * 0.01]);
      return [clamp(ga + margin, 1, 6), clamp(ga, 0, 5)];
    }
    if (res === 'D') {
      const g = pickIdx(rng, [0.24, 0.40, 0.26, 0.10]); // 0-0, 1-1, 2-2, 3-3
      return [g, g];
    }
    // res === 'L' — we lose, but we still score in roughly half of defeats
    const gf = pickIdx(rng, [0.50, 0.33, 0.13, 0.04]);        // our goals: 0,1,2,3
    const margin = 1 + pickIdx(rng, [0.58, 0.28, 0.10, 0.04]); // they win by 1..4
    return [clamp(gf, 0, 5), clamp(gf + margin, 1, 6)];
  }

  // TOUGHER win/draw model: opponents are stronger and rating-edge counts for less,
  // so even an elite XI is no longer guaranteed to win every game.
  function decide(str, opp, rng) {
    const diff = str - opp;
    const roll = rng() * 100;
    const winT = clamp(46 + diff * 4.8, 4, 93);
    const drawT = winT + clamp(23 - Math.abs(diff) * 2.1, 7, 23);
    return roll < winT ? 'W' : roll < drawT ? 'D' : 'L';
  }

  const OPP_POOL = ['Bayern Munich', 'Real Madrid', 'Barcelona', 'Manchester City', 'Liverpool', 'PSG', 'Inter', 'AC Milan', 'Juventus', 'Chelsea', 'Arsenal', 'Atlético Madrid', 'Borussia Dortmund', 'Porto', 'Ajax', 'Napoli', 'Benfica', 'Manchester United'];

  function sim(squad, label, opts) {
    const format = (opts && opts.format) || 'new';
    const isNew = format === 'new';
    const ratings = squad.map((p) => p.rating);
    const total = ratings.reduce((a, b) => a + b, 0);
    const avg = total / ratings.length;
    const lr = teamRatings(squad);
    const overall = lr.overall;
    const rng = seed(label + ':' + format + ':' + ratings.join(','));
    const str = overall;                 // team strength is the overall rating
    const gkRating = (squad.find((p) => p.line === 'GK') || {}).rating || lr.def || overall;
    const attOvr = lr.att || overall;
    // Penalty shootout: mostly a coin-flip, but a stronger attack and keeper tilt it a little.
    const penaltyWin = (oppLevel, rng2) => {
      const edge = ((attOvr - oppLevel) + (gkRating - oppLevel)) * 0.012;
      return rng2() < clamp(0.5 + edge, 0.32, 0.68);
    };
    const matches = [];
    const usedOpp = {};
    const pickOpp = (rng2) => { let o; let guard = 0; do { o = OPP_POOL[Math.floor(rng2() * OPP_POOL.length)]; guard++; } while (usedOpp[o] && guard < 14); usedOpp[o] = 1; return o; };

    // goal / assist ledgers across the whole run
    const goals = {}, assists = {};
    const attribute = (gf) => {
      const scorers = [];
      for (let g = 0; g < gf; g++) {
        const sc = weightedPick(squad, scorerW, rng);
        let as = null;
        if (rng() < 0.66) {
          const pool = squad.filter((x) => x !== sc);
          as = weightedPick(pool, assistW, rng);
        }
        if (sc) { goals[sc.n] = (goals[sc.n] || 0) + 1; scorers.push({ s: sc.shortName, a: as ? as.shortName : null }); }
        if (as) assists[as.n] = (assists[as.n] || 0) + 1;
      }
      return scorers;
    };

    let w = 0, d = 0, l = 0, perfect = true;
    const tally = (res) => { if (res === 'W') w++; else if (res === 'D') { d++; perfect = false; } else { l++; perfect = false; } };

    // Group / League phase — opponents raised so the league stage actually bites
    const groupName = isNew ? 'League Phase' : 'Group Stage';
    const groupShort = isNew ? 'League' : 'Group';
    const groupN = isNew ? 8 : 6;
    let pts = 0;
    if (isNew) {
      // Swiss league phase: eight different opponents, one game each
      const leagueOpps = [77, 78, 78, 79, 80, 81, 83, 84];
      for (let i = 0; i < groupN; i++) {
        const opp = leagueOpps[i] + (rng() - 0.5) * 2;
        const res = decide(str, opp, rng);
        const [gf, ga] = scoreline(res, str, opp, rng);
        if (res === 'W') pts += 3; else if (res === 'D') pts += 1;
        tally(res);
        matches.push({ round: groupShort, full: groupName, stage: 'LP', opp: pickOpp(rng), gf, ga, res, scorers: attribute(gf) });
      }
    } else {
      // Classic group of four: three rivals, each played home AND away (6 games)
      const rivalStrength = [80, 83, 86];
      for (let g = 0; g < 3; g++) {
        const oppName = pickOpp(rng);
        for (let leg = 0; leg < 2; leg++) {
          const opp = rivalStrength[g] + (rng() - 0.5) * 2;
          const res = decide(str, opp, rng);
          const [gf, ga] = scoreline(res, str, opp, rng);
          if (res === 'W') pts += 3; else if (res === 'D') pts += 1;
          tally(res);
          matches.push({ round: groupShort, full: groupName, stage: 'LP', opp: oppName, gf, ga, res, leg: leg + 1, scorers: attribute(gf) });
        }
      }
    }

    let furthest = groupName;
    const out = pts < (isNew ? 10 : 8);
    let champions = false;

    const KO = [
      { name: 'Round of 16', short: 'R16', o: 82 },
      { name: 'Quarter-final', short: 'Quarter', o: 84 },
      { name: 'Semi-final', short: 'Semi', o: 86 },
    ];
    if (!out) {
      let eliminated = false;
      for (let k = 0; k < KO.length && !eliminated; k++) {
        const opp = pickOpp(rng);
        let agf = 0, aga = 0;
        for (let leg = 0; leg < 2; leg++) {
          const O = KO[k].o + (rng() - 0.5) * 2;
          const res = decide(str, O, rng);
          const [gf, ga] = scoreline(res, str, O, rng);
          agf += gf; aga += ga; tally(res);
          matches.push({ round: KO[k].short, full: KO[k].name, stage: 'KO', opp, gf, ga, res, leg: leg + 1, scorers: attribute(gf) });
        }
        let advanced;
        if (agf > aga) advanced = true;
        else if (agf < aga) advanced = false;
        else { advanced = penaltyWin(KO[k].o, rng); matches[matches.length - 1].pens = advanced ? 'W' : 'L'; }
        furthest = KO[k].name;
        if (!advanced) { eliminated = true; perfect = false; }
      }
      if (!eliminated) {
        const O = 88 + (rng() - 0.5) * 2;
        const res = decide(str, O, rng);
        const [gf, ga] = scoreline(res, str, O, rng);
        tally(res);
        const finalMatch = { round: 'Final', full: 'Final', stage: 'KO', opp: pickOpp(rng), gf, ga, res, scorers: attribute(gf) };
        const won = res === 'W' ? true : res === 'L' ? false : (finalMatch.pens = penaltyWin(88, rng) ? 'W' : 'L', finalMatch.pens === 'W');
        matches.push(finalMatch);
        if (won) { furthest = 'Champions'; champions = true; } else { furthest = 'Final'; perfect = false; }
      }
    } else { perfect = false; }

    const targetN = groupN + 7;
    const recordPerfect = perfect && champions;

    // ---- awards: best player (highest rated, tie-break on goal involvements),
    //      top scorer (most goals), top playmaker (most assists)
    const statOf = (p) => ({ g: goals[p.n] || 0, a: assists[p.n] || 0 });
    let bestPlayer = null, topScorer = null, topPlaymaker = null;
    squad.forEach((p) => {
      const st = statOf(p);
      const ga = st.g + st.a;
      if (!bestPlayer || p.rating > bestPlayer.rating || (p.rating === bestPlayer.rating && ga > bestPlayer.g + bestPlayer.a)) {
        bestPlayer = { n: p.n, shortName: p.shortName, rating: p.rating, line: p.line, g: st.g, a: st.a };
      }
      if (!topScorer || st.g > topScorer.g || (st.g === topScorer.g && st.a > topScorer.a) || (st.g === topScorer.g && st.a === topScorer.a && p.rating > topScorer.rating)) {
        topScorer = { n: p.n, shortName: p.shortName, rating: p.rating, line: p.line, g: st.g, a: st.a };
      }
      if (!topPlaymaker || st.a > topPlaymaker.a || (st.a === topPlaymaker.a && st.g > topPlaymaker.g) || (st.a === topPlaymaker.a && st.g === topPlaymaker.g && p.rating > topPlaymaker.rating)) {
        topPlaymaker = { n: p.n, shortName: p.shortName, rating: p.rating, line: p.line, g: st.g, a: st.a };
      }
    });

    let grade, gColor, verdict;
    if (recordPerfect) { grade = 'A++'; gColor = 'var(--done)'; verdict = 'Invincible. ' + targetN + ' played, ' + targetN + ' won \u2014 a flawless march to the trophy. Here we go.'; }
    else if (furthest === 'Champions') { grade = 'A+'; gColor = 'var(--done)'; verdict = 'Champions of Europe. Not flawless, but they got the job done when it mattered most.'; }
    else if (furthest === 'Final') { grade = 'A-'; gColor = 'var(--interest)'; verdict = 'Agonising. Beaten in the final \u2014 a runners-up medal that will sting for years.'; }
    else if (furthest === 'Semi-final') { grade = 'B+'; gColor = 'var(--interest)'; verdict = 'A run to the last four. Proud nights, but the trophy stayed out of reach.'; }
    else if (furthest === 'Quarter-final') { grade = 'B'; gColor = 'var(--talks)'; verdict = 'Quarter-final exit. The squad ran out of road on the big European nights.'; }
    else if (furthest === 'Round of 16') { grade = 'C'; gColor = 'var(--talks)'; verdict = 'Out in the Round of 16 \u2014 not enough firepower when the knockouts arrived.'; }
    else { grade = overall < 78 ? 'F' : 'D'; gColor = 'var(--breaking)'; verdict = 'Eliminated in the ' + (isNew ? 'league phase' : 'group stage') + '. This draft never got going.'; }

    const recordStr = 'W' + w + ' D' + d + ' L' + l;
    return {
      total, avg, overall, att: lr.att, mid: lr.mid, def: lr.def,
      matches, w, d, l, pts, furthest, perfect: recordPerfect, champions,
      grade, gColor, verdict, recordStr, played: matches.length, targetN, format,
      goals, assists, bestPlayer, topScorer, topPlaymaker,
      gfTotal: matches.reduce((a, m) => a + m.gf, 0),
    };
  }

  const oppSquadFor = (club) => OPP_SQUADS[club] || GENERIC_OPP;
  function oppScorersFor(club, ga, rng) {
    if (ga <= 0) return [];
    const pool = oppSquadFor(club), avail = pool.slice(), out = [];
    for (let i = 0; i < ga; i++) {
      let name;
      if (avail.length && (out.length === 0 || rng() < 0.82)) name = avail.splice(Math.floor(rng() * avail.length), 1)[0];
      else name = out[Math.floor(rng() * out.length)];
      out.push(name || pool[0]);
    }
    return out;

  function createRun(squad, label, opts) {
    const format = (opts && opts.format) || 'new';
    const isNew = format === 'new';
    const ratings = squad.map((p) => p.rating);
    const total = ratings.reduce((a, b) => a + b, 0);
    const avg = total / ratings.length;
    const lr = teamRatings(squad);
    const overall = lr.overall;
    const rng = seed(label + ':' + format + ':' + ratings.join(','));
    const str = overall;
    const gkRating = (squad.find((p) => p.line === 'GK') || {}).rating || lr.def || overall;
    const attOvr = lr.att || overall;
    const penaltyAuto = (oppLevel) => { const edge = ((attOvr - oppLevel) + (gkRating - oppLevel)) * 0.012; return rng() < clamp(0.5 + edge, 0.32, 0.68); };

    const matches = [];
    const goals = {}, assists = {};
    const usedOpp = {};
    const pickOpp = () => { let o, g = 0; do { o = OPP_POOL[Math.floor(rng() * OPP_POOL.length)]; g++; } while (usedOpp[o] && g < 14); usedOpp[o] = 1; return o; };
    const attribute = (gf) => {
      const sc = [];
      for (let g = 0; g < gf; g++) {
        const s = weightedPick(squad, scorerW, rng);
        let a = null;
        if (rng() < 0.66) a = weightedPick(squad.filter((x) => x !== s), assistW, rng);
        if (s) { goals[s.n] = (goals[s.n] || 0) + 1; sc.push({ s: s.shortName, a: a ? a.shortName : null }); }
        if (a) assists[a.n] = (assists[a.n] || 0) + 1;
      }
      return sc;
    };

    let w = 0, d = 0, l = 0, perfect = true, pts = 0, champions = false, eliminated = false;
    const tally = (res) => { if (res === 'W') w++; else if (res === 'D') { d++; perfect = false; } else { l++; perfect = false; } };
    const groupName = isNew ? 'League Phase' : 'Group Stage';
    const groupShort = isNew ? 'League' : 'Group';
    const groupN = isNew ? 8 : 6;
    const targetN = groupN + 7;
    let furthest = groupName;

    // penalty takers: attackers (desc), then midfielders (desc), then defenders (desc); GK last resort
    const grp = (p) => (p.line === 'ATT' ? 0 : p.line === 'MID' ? 1 : p.line === 'GK' ? 3 : 2);
    const takers = squad.slice().sort((a, b) => grp(a) - grp(b) || b.rating - a.rating)
      .map((p) => ({ n: p.n, shortName: p.shortName, rating: p.rating, line: p.line }));

    let queue = [], finalPending = false, stage = 'group', table = null, pending = null;
    let koNamePool = [], poName = null, finalClub = null, weakPool = [], bracket = null;

    const shuffle = (arr) => { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); const t = a[i]; a[i] = a[j]; a[j] = t; } return a; };

    // orderedClubs: strongest first; they get the higher points so good teams finish higher.
    function buildBlock(youPts, orderedClubs, startPos, ptHi, ptLo) {
      const n = orderedClubs.length;
      const rows = [{ name: 'Your XI', pts: youPts, you: true }];
      for (let i = 0; i < n; i++) {
        const t = Math.round(ptHi - (ptHi - ptLo) * (i / Math.max(1, n)) + (rng() - 0.5) * 2.6);
        rows.push({ name: orderedClubs[i], pts: clamp(t, ptLo - 1, ptHi + 2) });
      }
      rows.sort((a, b) => b.pts - a.pts || (a.you ? -1 : (b.you ? 1 : rng() - 0.5)));
      rows.forEach((r, i) => { r.pos = startPos + i; });
      return rows;
    }

    function playGroup() {
      if (isNew) {
        const leagueOpps = [77, 80, 82, 84, 85, 86, 88, 90];
        for (let i = 0; i < groupN; i++) {
          const opp = leagueOpps[i] + (rng() - 0.5) * 2;
          const res = decide(str, opp, rng);
          const [gf, ga] = scoreline(res, str, opp, rng);
          if (res === 'W') pts += 3; else if (res === 'D') pts += 1;
          tally(res);
          const oppName = pickOpp();
          matches.push({ round: groupShort, full: groupName, stage: 'LP', opp: oppName, gf, ga, res, scorers: attribute(gf), oppScorers: oppScorersFor(oppName, ga, rng) });
        }
        // strong sides that fill the top of the table and reappear in the knockouts
        const eliteShuf = shuffle(ELITE_CLUBS);
        const surpShuf = shuffle(SURPRISE_CLUBS);
        const top8Clubs = eliteShuf.slice(0, 6).concat([surpShuf[0]]); // 6 heavyweights + 1 gatecrasher
        koNamePool = shuffle(top8Clubs); // QF/SF/final opponents are exactly the sides in your top-8 table
        const strongSet = {}; koNamePool.forEach((c) => { strongSet[c] = 1; });
        // the 9th-24th sides (smaller clubs, plus the odd fallen giant) — kept distinct from the top-8 seeds
        weakPool = shuffle(surpShuf.slice(1).concat(eliteShuf.slice(7))).filter((c) => !strongSet[c]);
        const playoffClubs = weakPool.slice(0, 15);
        let status, rows, blockTitle, blockNote;
        if (pts >= 16) { status = 'top8'; rows = buildBlock(pts, top8Clubs, 1, 21, 16); blockTitle = 'League Phase \u2014 Top 8'; blockNote = 'The top eight go straight through to the Round of 16.'; }
        else if (pts >= 10) { status = 'playoff'; rows = buildBlock(pts, playoffClubs, 9, 15, 10); blockTitle = 'League Phase \u2014 Play-off places (9\u201324)'; blockNote = 'Finishing 9th\u201324th means a two-legged knockout play-off.'; }
        else { status = 'out'; rows = null; blockTitle = 'League Phase'; blockNote = 'Finishing 25th\u201336th means elimination.'; }
        table = { kind: 'league', status, rows, position: rows ? (rows.find((r) => r.you) || {}).pos : null, blockTitle, blockNote, pts, played: groupN };
      } else {
        const rivalStrength = [82, 85, 88];
        const rivalNames = [pickOpp(), pickOpp(), pickOpp()];   // three distinct rivals, chosen up front
        const rp = [0, 0, 0];   // each rival's real points across their six games
        // your six games, interleaved A-B-C then A-B-C (not A-A-B-B-C-C)
        for (let leg = 0; leg < 2; leg++) {
          for (let g = 0; g < 3; g++) {
            const oppName = rivalNames[g];
            const opp = rivalStrength[g] + (rng() - 0.5) * 2;
            const res = decide(str, opp, rng);
            const [gf, ga] = scoreline(res, str, opp, rng);
            if (res === 'W') pts += 3; else if (res === 'D') pts += 1;
            rp[g] += res === 'W' ? 0 : res === 'D' ? 1 : 3;
            tally(res);
            matches.push({ round: groupShort, full: groupName, stage: 'LP', opp: oppName, gf, ga, res, leg: leg + 1, scorers: attribute(gf), oppScorers: oppScorersFor(oppName, ga, rng) });
          }
        }
        // the rivals also play each other (home + away), so the table always balances
        for (const [i, j] of [[0, 1], [0, 2], [1, 2]]) {
          for (let leg = 0; leg < 2; leg++) {
            const res = decide(rivalStrength[i] + (rng() - 0.5) * 2, rivalStrength[j], rng);
            rp[i] += res === 'W' ? 3 : res === 'D' ? 1 : 0;
            rp[j] += res === 'W' ? 0 : res === 'D' ? 1 : 3;
          }
        }
        const rows = [{ name: 'Your XI', pts, you: true }, { name: rivalNames[0], pts: rp[0] }, { name: rivalNames[1], pts: rp[1] }, { name: rivalNames[2], pts: rp[2] }];
        rows.sort((a, b) => b.pts - a.pts || (a.you ? -1 : b.you ? 1 : rng() - 0.5));
        rows.forEach((r, i) => { r.pos = i + 1; });
        const pos = rows.find((r) => r.you).pos;
        const advanced = pos <= 2;
        table = { kind: 'classic', status: advanced ? 'qualified' : 'out', rows, position: pos, blockTitle: 'Group ' + String.fromCharCode(65 + Math.floor(rng() * 8)), blockNote: 'The top two advance to the Round of 16.', pts, played: 6 };
        koNamePool = shuffle(ELITE_CLUBS.filter((c) => rivalNames.indexOf(c) === -1)).concat(shuffle(SURPRISE_CLUBS));
      }
      stage = 'table';
      return table;
    }

    function buildBracket(p) {
      const used = {}; ['Your XI', p.r16, p.qf, p.sf, p.fin, p.poClub].forEach((n) => { if (n) used[n] = 1; });
      const fillerPool = shuffle(p.strong.concat(p.weak)).filter((n) => !used[n]);
      let fi = 0;
      const filler = () => { while (fi < fillerPool.length && used[fillerPool[fi]]) fi++; const n = fillerPool[fi] || ('Club ' + (fi + 1)); used[n] = 1; fi++; return n; };
      const Y = { name: 'Your XI', you: true };
      const slots = [Y, { name: p.r16 }, { name: p.qf }, { name: filler() }, { name: p.sf }, { name: filler() }, { name: filler() }, { name: filler() }, { name: p.fin }];
      for (let i = 9; i < 16; i++) slots.push({ name: filler() });
      const r16ties = []; for (let i = 0; i < 16; i += 2) r16ties.push({ teams: [slots[i], slots[i + 1]] });
      const r16adv = [Y, { name: p.qf }, { name: p.sf }, slots[6], { name: p.fin }, slots[10], slots[12], slots[14]];
      r16ties.forEach((t, i) => { t.win = r16adv[i]; });
      const qfties = []; for (let i = 0; i < 8; i += 2) qfties.push({ teams: [r16adv[i], r16adv[i + 1]] });
      const qfadv = [Y, { name: p.sf }, { name: p.fin }, r16adv[6]];
      qfties.forEach((t, i) => { t.win = qfadv[i]; });
      const sfties = [{ teams: [qfadv[0], qfadv[1]] }, { teams: [qfadv[2], qfadv[3]] }];
      const sfadv = [Y, { name: p.fin }];
